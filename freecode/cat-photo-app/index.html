<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cat-photo-app</title>
</head>
<body>
    <main>
        <h1>CatPhotoApp</h1>
        <section>
            <h2>Cat Photos</h2>
            <p>Everyone loves <a href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg" target="_blank">cute cats</a> online! </p>
            <p>See more <a href="https://freecatphotoapp.com" target="_blank">cat photos</a> in our gallery</p>
            <a href="https://freecatphotoapp.com">
            <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg" alt="A cute orange cat lying on its back.">
            </a>
        </section>
        <section>
            <h2>Cat List</h2>
            <h3>Things Cats love</h3>
            <ul>
                <li>catnip</li>
                <li>laser pointers</li>
                <li>lasagna</li>
            </ul>
            <figure>
                <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg" alt="A slice of lasagna on a plate">
                <figcaption>Cats <em>Love</em> Lasagna</figcaption>
                                <!--<em> Destaca uma palavra ou frase!-->
                
            </figure>
            <h3>Top 3 things cats hate:</h3>
            <ol>
                <li>Flea treatment</li>
                <li>thunder</li>
                <li>other cats</li>
            </ol>
            <figure>
                <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" alt="Two tabby kittens sleeping together on a couch">
                <figcaption>Cats <strong>hate</strong> other cats.</figcaption>
                                <!--Strong deixa em negrito-->
            </figure>

        </section>
    </main>
    <!--Rodapé-->
    <footer>
        <p>No CopyRight - <a href="https://www.freecodecamp.org">freecodecamp.org</a></p>
    </footer>
    
</body>
</html>
